on:
  pull_request:
    branches:
      - main

name: validate

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run biome:check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: .
          push: false
          load: true
          tags: html2pdf:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run PDF service container
        run: docker run -d -p 3000:3000 --name html2pdf html2pdf:test

      - name: Wait for PDF service
        run: |
          curl --retry 30 --retry-delay 1 --retry-all-errors --fail --silent --show-error \
            http://localhost:3000/healthz \
            || { echo "Service never became healthy"; docker logs html2pdf; exit 1; }

      - run: npm run test

      - name: Stop PDF container
        if: always()
        run: docker stop html2pdf && docker rm html2pdf
